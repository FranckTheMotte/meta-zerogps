# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-zerogps"
BBFILE_PATTERN_meta-zerogps = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-zerogps = "6"

LAYERDEPENDS_meta-zerogps = "core"
LAYERSERIES_COMPAT_meta-zerogps = "whinlatter"
